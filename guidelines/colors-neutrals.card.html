<!-- @dsCard group="Colors" viewport="700x150" name="Obsidian Neutrals" subtitle="Cool blue-black ramp, 1000 → 000" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-base); }
  .ramp { display: flex; gap: 6px; }
  .sw { flex: 1; height: 84px; border-radius: var(--radius-sm); border: 1px solid var(--border-subtle);
        display: flex; align-items: flex-end; padding: 7px; }
  .sw span { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); }
  .sw.light span { color: rgb(3 4 7 / 0.7); }
</style>
</head>
<body>
  <div class="ramp">
    <div class="sw" style="background:var(--ob-1000)"><span>1000</span></div>
    <div class="sw" style="background:var(--ob-900)"><span>900</span></div>
    <div class="sw" style="background:var(--ob-800)"><span>800</span></div>
    <div class="sw" style="background:var(--ob-700)"><span>700</span></div>
    <div class="sw" style="background:var(--ob-600)"><span>600</span></div>
    <div class="sw" style="background:var(--ob-500)"><span>500</span></div>
    <div class="sw" style="background:var(--ob-400)"><span>400</span></div>
    <div class="sw" style="background:var(--ob-300)"><span>300</span></div>
    <div class="sw light" style="background:var(--ob-200)"><span>200</span></div>
    <div class="sw light" style="background:var(--ob-100)"><span>100</span></div>
    <div class="sw light" style="background:var(--ob-050)"><span>050</span></div>
  </div>
</body>
</html>
