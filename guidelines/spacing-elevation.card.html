<!-- @dsCard group="Spacing" viewport="700x200" name="Elevation & Glass" subtitle="Shadow ramp + inset highlight + accent glow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 30px 24px; background: var(--surface-base); display:flex; gap: 22px; align-items:center; }
  .item { text-align:center; }
  .box { width: 96px; height: 72px; border-radius: var(--radius-lg); background: var(--surface-raised);
         border: 1px solid var(--border-default); }
  .item span { display:block; font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); margin-top: 12px; }
</style>
</head>
<body>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span>sm</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><span>md</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span>lg</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span>xl</span></div>
  <div class="item"><div class="box" style="background:var(--surface-glass); box-shadow:var(--shadow-lg),var(--inset-highlight-strong)"></div><span>glass</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--glow-accent-strong); border-color:var(--border-accent)"></div><span>glow</span></div>
</body>
</html>
