<!-- @dsCard group="Type" viewport="700x260" name="Type Scale" subtitle="Display → caption, with tokens" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-base); }
  .line { display:flex; align-items:baseline; gap: 18px; border-bottom: 1px solid var(--border-subtle);
          padding: 9px 0; }
  .line:last-child { border-bottom: 0; }
  .t { font-family: var(--font-display); color: var(--text-primary); letter-spacing: var(--ls-tight);
       white-space: nowrap; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); margin-left: auto; }
</style>
</head>
<body>
  <div class="line"><span class="t" style="font-size:44px">Display</span><span class="tok">--fs-display-l</span></div>
  <div class="line"><span class="t" style="font-size:36px">Heading 1</span><span class="tok">--fs-h1 · 36</span></div>
  <div class="line"><span class="t" style="font-size:28px">Heading 2</span><span class="tok">--fs-h2 · 28</span></div>
  <div class="line"><span class="t" style="font-size:22px">Heading 3</span><span class="tok">--fs-h3 · 22</span></div>
  <div class="line"><span class="t" style="font-family:var(--font-body);font-size:16px;color:var(--text-secondary)">Body — 16px</span><span class="tok">--fs-body</span></div>
  <div class="line"><span class="t" style="font-family:var(--font-body);font-size:13px;color:var(--text-tertiary)">Caption — 13px</span><span class="tok">--fs-caption</span></div>
</body>
</html>
