<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base unit, geometric rhythm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-base); display:flex; align-items:flex-end; gap: 10px; }
  .item { text-align:center; }
  .bar { background: linear-gradient(180deg, var(--azure-400), var(--azure-600)); width: 100%;
         border-radius: var(--radius-xs) var(--radius-xs) 0 0; }
  .item span { display:block; font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); margin-top: 7px; }
  .item { width: 46px; }
</style>
</head>
<body>
  <div class="item"><div class="bar" style="height:4px"></div><span>1·4</span></div>
  <div class="item"><div class="bar" style="height:8px"></div><span>2·8</span></div>
  <div class="item"><div class="bar" style="height:12px"></div><span>3·12</span></div>
  <div class="item"><div class="bar" style="height:16px"></div><span>4·16</span></div>
  <div class="item"><div class="bar" style="height:24px"></div><span>5·24</span></div>
  <div class="item"><div class="bar" style="height:32px"></div><span>6·32</span></div>
  <div class="item"><div class="bar" style="height:48px"></div><span>8·48</span></div>
  <div class="item"><div class="bar" style="height:64px"></div><span>9·64</span></div>
  <div class="item"><div class="bar" style="height:80px"></div><span>10·80</span></div>
</body>
</html>
