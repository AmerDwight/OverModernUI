<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-base); }
  .big { font-family: var(--font-display); font-weight: 600; font-size: 64px;
         letter-spacing: var(--ls-tight); color: var(--text-primary); line-height: 1; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); margin-top: 16px;
          letter-spacing: var(--ls-overline); text-transform: uppercase; }
  .row { display:flex; gap: 28px; align-items:baseline; margin-top: 14px; }
  .row span { font-family: var(--font-display); color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="big">Over<span style="color:var(--azure-400)">Modern</span></div>
  <div class="row">
    <span style="font-weight:400">Regular</span>
    <span style="font-weight:500">Medium</span>
    <span style="font-weight:600">SemiBold</span>
    <span style="font-weight:700">Bold</span>
  </div>
  <div class="meta">Space Grotesk · ls −0.015em</div>
</body>
</html>
