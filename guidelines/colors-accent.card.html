<!-- @dsCard group="Colors" viewport="700x170" name="Accent — Electric Azure" subtitle="Primary brand accent + iridescent cyan highlight" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-base); display:flex; gap: 20px; }
  .group { flex: 1; }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: var(--ls-overline);
           text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 10px; }
  .row { display: flex; gap: 6px; }
  .sw { flex: 1; height: 80px; border-radius: var(--radius-sm); display:flex; align-items:flex-end; padding: 7px;
        border: 1px solid var(--border-subtle); }
  .sw span { font-family: var(--font-mono); font-size: 10px; color: #fff; mix-blend-mode: difference; }
</style>
</head>
<body>
  <div class="group">
    <div class="label">Azure · primary</div>
    <div class="row">
      <div class="sw" style="background:var(--azure-300)"><span>300</span></div>
      <div class="sw" style="background:var(--azure-400)"><span>400</span></div>
      <div class="sw" style="background:var(--azure-500); box-shadow: var(--glow-accent)"><span>500</span></div>
      <div class="sw" style="background:var(--azure-600)"><span>600</span></div>
      <div class="sw" style="background:var(--azure-700)"><span>700</span></div>
    </div>
  </div>
  <div class="group">
    <div class="label">Cyan · highlight</div>
    <div class="row">
      <div class="sw" style="background:var(--cyan-300)"><span>300</span></div>
      <div class="sw" style="background:var(--cyan-400)"><span>400</span></div>
      <div class="sw" style="background:var(--cyan-500)"><span>500</span></div>
    </div>
  </div>
</body>
</html>
