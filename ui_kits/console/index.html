<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OverModern Console</title>
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="console.css">
<style>
  html, body { height: 100%; margin: 0; background: var(--surface-base); }
  #root { height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="Sidebar.jsx"></script>
  <script type="text/babel" src="Topbar.jsx"></script>
  <script type="text/babel" src="LoginScreen.jsx"></script>
  <script type="text/babel" src="OverviewScreen.jsx"></script>
  <script type="text/babel" src="DeploymentsScreen.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
  <script type="text/babel" data-presets="react">
    function mount() {
      if (!window.ConsoleApp) return setTimeout(mount, 40);
      ReactDOM.createRoot(document.getElementById("root")).render(<window.ConsoleApp />);
    }
    mount();
  </script>
</body>
</html>
