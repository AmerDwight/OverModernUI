<!-- @dsCard group="Components" viewport="700x360" name="Forms — Inputs, Select, Switch, Textarea, Slider" subtitle="Field controls & states" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-base); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px 28px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 16px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Input, Select, Switch, Checkbox, Textarea, Slider, Icon } = window.OverModernDesignSystem_22ac94;
    function Demo() {
      return (
        <div className="grid">
          <div className="stack">
            <Input label="Project name" placeholder="acme-prod" required />
            <Input label="Search" placeholder="Filter resources…" iconLeft={<Icon name="search" size={16} className="lead" />} />
            <Input label="Email" defaultValue="ada@over" error="That address is already in use." />
            <Slider label="vCPU" min={1} max={16} step={1} defaultValue={4} ticks={["1", "8", "16"]} formatValue={(v) => `${v} cores`} />
          </div>
          <div className="stack">
            <Select label="Region" placeholder="Choose region" options={["us-east-1", "eu-west-2", "ap-south-1"]} />
            <Textarea label="Release notes" placeholder="What changed in this deploy?" rows={3} maxLength={280} showCount />
            <Switch label="Enable telemetry" defaultChecked />
            <Checkbox label="Remember this device" defaultChecked />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
