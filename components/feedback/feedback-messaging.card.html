<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root" style="display:contents"></div>
  <script type="text/babel">
    const { Alert, EmptyState, Button, Icon } = window.OverModernDesignSystem_22ac94;
    function Demo() {
      return (
        <React.Fragment>
          <div>
            <div className="lbl">Alert · 4 tones</div>
            <div className="stack">
              <Alert variant="info">Edge cache will purge in ~30s after each deploy.</Alert>
              <Alert variant="success" title="Build passed">All 248 checks green on commit a3f9c1.</Alert>
              <Alert variant="warning" title="Staging is behind production"
                actions={<Button size="sm" variant="secondary">Sync now</Button>} onClose={() => {}}>
                staging is 3 deploys behind prod.
              </Alert>
              <Alert variant="danger" title="Deployment failed" onClose={() => {}}>
                3 type errors in api/handlers.ts.
              </Alert>
            </div>
          </div>
          <div>
            <div className="lbl">Empty state</div>
            <EmptyState
              bordered
              icon="rocket"
              title="No deployments yet"
              description="Connect a repository and push to main to ship your first build."
              actions={<>
                <Button variant="primary" iconLeft={<Icon name="git-branch" size={16} />}>Connect repo</Button>
                <Button variant="ghost">Docs</Button>
              </>}
            />
          </div>
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>

</html>
